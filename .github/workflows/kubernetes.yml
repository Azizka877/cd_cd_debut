name: kubernetes

on: 
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
    - name: code checkout
      uses: actions/checkout@v4
    - name: Build docker image
      run: "docker build --no-cache -t azizka12/gha-pyapp:${GITHUB_SHA::7} ."
    - name: Login to docker
      uses: docker/login-action@v3
      with:
        username: " ${{ secrets.DOCKER_USERNAME }}"
        password: " ${{ secrets.DOCKER_PASSWORD }}"
    - name: Install yq
      run: |
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    - name: Update deployment.yml with latest docker tag
      run: |
         SHORT_SHA=${GITHUB_SHA::7}
         yq eval -i '.spec.template.spec.containers[0].image = "azizka12/gha-pyapp:'${SHORT_SHA}'"' k8s/pyapp-deployment.yml

    - name: Commit deployment file changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions@noreply.github.com"
        git add k8s/pyapp-deployment.yml
        git commit -m "docker tag updated by GitHub Actions [skip ci]"
        git push
      
