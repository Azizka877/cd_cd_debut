apiVersion: v1
kind: Service
metadata:
  name: pyapp-service
  labels:
    app: pyapp
spec:
  selector:
    app: pyapp             # ⚠️ doit correspondre aux labels du deployment
  ports:
  - protocol: TCP
    port: 80               # Port exposé à l'extérieur
    targetPort: 8000       # Port du conteneur
  type: LoadBalancer